<div class="modal-overlay" *ngIf="showModal">

  <div class="modal-container small-modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h3>Change Password</h3>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <!-- MESSAGE HERE -->

    <div *ngIf="successMessage" class="success-alert">
      ✔ {{successMessage}}
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      ⚠ {{errorMessage}}
    </div>

    <form [formGroup]="form" (ngSubmit)="changePassword()">

      <div class="top-grid single-column">
        <!--      <div class="form-grid">-->

        <input
          type="text"
          name="username"
          [value]="username"
          autocomplete="username"
          style="display:none">

        <div class="field-group">
          <label>Current Password <span class="required"> * </span></label>
          <input type="password" formControlName="currentPassword" autocomplete="current-password" class="input">

          <small class="error"
                 *ngIf="form.get('currentPassword')?.touched &&
 form.get('currentPassword')?.invalid">
            Current Password is required
          </small>
        </div>

        <div class="field-group">
          <label>New Password <span class="required"> * </span></label>
          <input type="password" formControlName="newPassword" autocomplete="new-password" class="input">
          <small class="error"
                 *ngIf="form.get('newPassword')?.touched &&
 form.get('newPassword')?.invalid">
            New Password is required
          </small>
        </div>

        <div class="field-group">
          <label>Confirm Password <span class="required"> * </span></label>
          <input type="password" formControlName="confirmPassword" autocomplete="new-password" class="input">
          <small class="error"
                 *ngIf="form.get('confirmPassword')?.touched &&
 form.get('confirmPassword')?.invalid">
            Confirm Password is required
          </small>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="cancel-btn" (click)="close()">Cancel
        </button>
        <button type="submit" class="save-btn" [disabled]="form.invalid">Update</button>
      </div>

    </form>

  </div>

</div>
