<div class="login-page">

  <!-- BACKGROUND IMAGE -->
  <div class="bg-overlay"></div>

  <!-- LOGIN CARD -->
  <div class="login-card">

    <img src="assets/logo.png" class="logo" />

    <h2>മാങ്കുറുശ്ശി ഭഗവതി ക്ഷേത്രം</h2>
<!--    <h3>Temple Billing System</h3>-->
    <p class="subtitle">Sign in to continue</p>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <!-- USERNAME -->
      <div class="form-group">

        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          #usernameRef="ngModel"
          placeholder="Email or Phone"
          required
          minlength="3">

        <div class="error" *ngIf="usernameRef.invalid && usernameRef.touched">
          <small *ngIf="usernameRef.errors?.['required']">Username required</small>
          <small *ngIf="usernameRef.errors?.['minlength']">Min 3 chars</small>
        </div>

      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          #passwordRef="ngModel"
          placeholder="Password"
          required
          minlength="4">
        <div class="error" *ngIf="passwordRef.invalid && passwordRef.touched">
          <small *ngIf="passwordRef.errors?.['required']">Password required</small>
          <small *ngIf="passwordRef.errors?.['minlength']">Min 4 chars</small>
        </div>
      </div>

      <!-- OPTIONS -->
      <div class="options">
        <label>
          <input type="checkbox"> Remember me
        </label>
        <a href="#">Forgot?</a>
      </div>

      <!-- BUTTON -->
      <button type="submit" [disabled]="loginForm.invalid">
        Sign In
      </button>

      <!-- ERROR -->
      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>

    </form>
  </div>

</div>
